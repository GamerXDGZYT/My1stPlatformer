<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Emblem Studio Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="ui-container">
        <h2>Emblem Studio</h2>
        
        <div class="control-group">
            <label for="shapeSelect">Base Shape</label>
            <select id="shapeSelect">
                <option value="coin">Classic Coin</option>
                <option value="square">Square Plaque</option>
                <option value="diamond">3D Diamond</option>
                <option value="star">Star Badge</option>
            </select>
        </div>

        <div class="control-group">
            <label for="materialSelect">Material Style</label>
            <select id="materialSelect">
                <option value="metal">Polished Metal</option>
                <option value="plastic">Vibrant Plastic</option>
                <option value="glass">Physical Glass</option>
            </select>
        </div>

        <div class="control-group">
            <label for="emblemColor">Color Palette</label>
            <input type="color" id="emblemColor" value="#ffd700">
        </div>

        <div class="control-group">
            <label for="emblemText">Center Initials</label>
            <input type="text" id="emblemText" value="A" maxlength="3" autocomplete="off">
        </div>

        <button id="toggleSpin" class="btn">Stop Spinning</button>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    
    <script src="main.js"></script>
</body>
</html>
