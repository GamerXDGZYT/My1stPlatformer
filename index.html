<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Emblem Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <h2>Emblem Maker</h2>
        
        <div class="control-group">
            <label for="emblemColor">Emblem Color:</label>
            <input type="color" id="emblemColor" value="#ffd700">
        </div>

        <div class="control-group">
            <label for="shapeSelect">Choose Shape:</label>
            <select id="shapeSelect">
                <option value="coin">Classic Coin</option>
                <option value="square">Square Plaque</option>
                <option value="diamond">3D Diamond</option>
                <option value="star">Star Badge</option>
            </select>
        </div>

        <button id="toggleSpin">Stop Spinning</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
